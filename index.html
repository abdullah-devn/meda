<!DOCTYPE html>
<html lang="ar" dir="rtl" translate="no" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>مدى فوياج · Meda Voyages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#1B5E5A; --teal-d:#0F3F3C; --teal-2:#247470; --teal-soft:#1B5E5A14;
    --gold:#BE9540; --gold-2:#D8B968; --gold-d:#9A772E;
    --cream:#F6F1E7; --cream-2:#EEE6D5; --paper:#FFFFFF; --ink:#16201E;
    --txt:#1E2A28; --muted:#5E6E6A; --line:#E2D9C7; --line-d:rgba(255,255,255,.14);
    --maxw:1200px; --pad:clamp(20px,5vw,68px);
    --disp:'Cormorant Garamond',serif; --body:'Jost',sans-serif; --ara:'Tajawal',sans-serif;
    --shadow:0 16px 40px rgba(15,40,38,.10);
  }
  html[lang="ar"]{--body:'Tajawal',sans-serif;--disp:'Tajawal',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:var(--body);background:var(--cream);color:var(--txt);line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  a{color:inherit;text-decoration:none;} img{display:block;max-width:100%;} button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--gold);color:#fff;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding-inline:var(--pad);}
  h1,h2,h3{line-height:1.15;font-weight:700;}
  html[lang="fr"] h1,html[lang="fr"] h2,html[lang="fr"] .disp{font-family:var(--disp);font-weight:600;letter-spacing:.01em;}
  :focus-visible{outline:2px solid var(--gold);outline-offset:3px;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto;}}
  [data-reveal]{opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s cubic-bezier(.2,.7,.2,1);}
  [data-reveal].in{opacity:1;transform:none;}

  /* topbar */
  .topbar{background:var(--teal-d);color:#cfe0dd;font-size:12.5px;}
  .topbar .in{display:flex;align-items:center;gap:16px;height:40px;}
  .topbar a{display:inline-flex;align-items:center;gap:7px;color:#cfe0dd;}
  .topbar a:hover{color:var(--gold-2);}
  .topbar svg{width:14px;height:14px;}
  .topbar .langwrap{margin-inline-start:auto;display:flex;align-items:center;gap:8px;}
  .topbar .langwrap>svg{width:15px;height:15px;flex:none;stroke:#8fb0ab;}
  .topbar .lang{display:flex;border:1px solid rgba(255,255,255,.2);border-radius:7px;overflow:hidden;}
  .topbar .lang button{background:none;border:0;color:#a9c4c0;font-weight:600;font-size:12.5px;padding:6px 13px;transition:background .2s,color .2s;min-height:30px;}
  .topbar .lang button.on{color:var(--teal-d);background:var(--gold-2);}

  /* header */
  header.nav{position:sticky;top:0;z-index:60;background:transparent;transition:background .35s,box-shadow .35s,border-color .35s;border-bottom:1px solid transparent;}
  header.nav.scrolled{background:rgba(246,241,231,.92);backdrop-filter:blur(12px);border-bottom-color:var(--line);box-shadow:0 8px 30px rgba(15,40,38,.07);}
  .nav-in{display:flex;align-items:center;gap:18px;height:76px;}
  .brand{display:flex;align-items:center;gap:11px;flex:none;}
  .brand .chip{background:#fff;border-radius:12px;padding:7px 11px;box-shadow:0 5px 18px rgba(15,40,38,.12);}
  .brand .chip img{height:34px;width:auto;display:block;}
  nav.menu{display:flex;gap:3px;margin-inline-start:auto;}
  nav.menu a{font-size:14.5px;font-weight:600;color:#43534f;padding:9px 14px;border-radius:9px;transition:color .2s,background .2s;}
  header.nav:not(.scrolled) nav.menu a{color:rgba(255,255,255,.9);}
  header.nav:not(.scrolled) .topglass{color:#fff;}
  nav.menu a:hover{color:var(--gold-d);background:var(--cream-2);}
  header.nav:not(.scrolled) nav.menu a:hover{color:var(--gold-2);background:rgba(255,255,255,.08);}
  html[lang="fr"] nav.menu a{font-family:var(--body);}
  .nav-cta{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#fff;font-weight:700;font-size:14px;padding:11px 20px;border-radius:10px;transition:background .2s,transform .2s;flex:none;}
  .nav-cta:hover{background:var(--gold-d);transform:translateY(-1px);}
  .burger{display:none;width:46px;height:46px;border:1px solid var(--line-d);border-radius:10px;background:rgba(255,255,255,.1);align-items:center;justify-content:center;flex:none;}
  header.nav.scrolled .burger{border-color:var(--line);background:#fff;}
  .burger span,.burger span::before,.burger span::after{content:"";display:block;width:18px;height:2px;background:#fff;position:relative;}
  header.nav.scrolled .burger span,header.nav.scrolled .burger span::before,header.nav.scrolled .burger span::after{background:var(--ink);}
  .burger span::before{position:absolute;top:-6px;}.burger span::after{position:absolute;top:6px;}
  .mob{display:none;background:var(--teal-d);}
  .mob a{display:block;padding:14px var(--pad);color:#e7efed;border-bottom:1px solid var(--line-d);font-weight:600;font-size:15px;}

  /* hero */
  .hero{position:relative;min-height:clamp(560px,93vh,880px);display:flex;align-items:center;color:#fff;margin-top:-116px;padding-top:116px;}
  .hero .bg{position:absolute;inset:0;z-index:-2;background-size:cover;background-position:center;}
  .hero::after{content:"";position:absolute;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(11,40,38,.62),rgba(11,40,38,.30) 38%,rgba(11,40,38,.80));}
  .hero-in{padding-block:clamp(40px,8vh,96px);max-width:760px;}
  .eyebrow{display:inline-flex;align-items:center;gap:9px;font-size:13px;letter-spacing:.04em;color:var(--gold-2);font-weight:600;margin-bottom:18px;background:rgba(255,255,255,.08);border:1px solid rgba(216,185,104,.4);padding:7px 16px;border-radius:100px;}
  .eyebrow svg{width:15px;height:15px;stroke:var(--gold-2);}
  .hero h1{font-size:clamp(34px,6.2vw,68px);font-weight:800;line-height:1.12;letter-spacing:-.01em;}
  html[lang="fr"] .hero h1{font-family:var(--disp);font-weight:700;letter-spacing:.01em;}
  .hero h1 .g{color:var(--gold-2);}
  .hero p.lead{font-size:clamp(15px,1.9vw,19px);font-weight:300;color:#e6efed;max-width:36em;margin-top:18px;}
  html[lang="ar"] .hero p.lead{font-weight:400;}
  .hero-cta{display:flex;gap:12px;flex-wrap:wrap;margin-top:30px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-weight:700;font-size:14.5px;padding:14px 26px;border-radius:11px;border:1px solid transparent;transition:transform .2s,background .2s,color .2s,border-color .2s;}
  .btn svg{width:18px;height:18px;}
  .btn-gold{background:var(--gold);color:#fff;}
  .btn-gold:hover{background:var(--gold-d);transform:translateY(-2px);}
  .btn-wa{background:#25D366;color:#0b3a25;} .btn-wa:hover{background:#1fb957;transform:translateY(-2px);}
  .btn-line{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(255,255,255,.5);}
  .btn-line:hover{background:#fff;color:var(--teal-d);}
  .hero-phones{display:flex;gap:20px;flex-wrap:wrap;margin-top:26px;color:#e6efed;font-size:14px;}
  .hero-phones a{display:inline-flex;align-items:center;gap:9px;color:#e6efed;}
  .hero-phones .pi{width:36px;height:36px;border-radius:50%;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;}
  .hero-phones .pi svg{width:16px;height:16px;stroke:var(--gold-2);}
  .hero-phones b{font-weight:600;direction:ltr;}

  /* sections */
  .block{padding-block:clamp(54px,8vw,100px);}
  section[id]{scroll-margin-top:84px;}
  .head{max-width:48em;margin-bottom:40px;}
  .head.center{margin-inline:auto;text-align:center;}
  .kicker{display:inline-flex;align-items:center;gap:9px;font-size:12.5px;letter-spacing:.05em;color:var(--gold-d);font-weight:700;margin-bottom:14px;}
  .kicker::before{content:"";width:26px;height:2px;background:var(--gold);border-radius:2px;}
  .head.center .kicker::after{content:"";width:26px;height:2px;background:var(--gold);border-radius:2px;}
  h2.title{font-size:clamp(27px,4vw,44px);font-weight:800;letter-spacing:-.01em;color:var(--ink);}
  html[lang="fr"] h2.title{font-family:var(--disp);font-weight:700;letter-spacing:.01em;}
  .lead2{font-size:clamp(15px,1.7vw,17.5px);color:var(--muted);margin-top:14px;font-weight:300;}
  html[lang="ar"] .lead2{font-weight:400;}

  /* destinations */
  .dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
  .dest{position:relative;overflow:hidden;border-radius:18px;aspect-ratio:3/4;background:linear-gradient(160deg,var(--teal-2),var(--teal-d));box-shadow:var(--shadow);display:block;}
  .dest img{width:100%;height:100%;object-fit:cover;transition:transform .9s cubic-bezier(.2,.7,.2,1);}
  .dest.noimg img{display:none;}
  .dest::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 38%,rgba(9,30,28,.86));transition:background .3s;}
  .dest:hover img{transform:scale(1.08);}
  .dest .c{position:absolute;inset-inline:0;bottom:0;padding:24px;z-index:2;}
  .dest .fl{font-size:13px;letter-spacing:.05em;color:var(--gold-2);font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:7px;}
  .dest .fl svg{width:15px;height:15px;stroke:var(--gold-2);}
  .dest h3{color:#fff;font-size:25px;font-weight:700;}
  html[lang="fr"] .dest h3{font-family:var(--disp);}
  .dest .go{margin-top:12px;display:inline-flex;align-items:center;gap:8px;color:#fff;font-size:13.5px;font-weight:600;opacity:0;transform:translateY(8px);transition:opacity .35s,transform .35s;}
  .dest .go svg{width:16px;height:16px;}
  .dest:hover .go{opacity:1;transform:none;}

  /* omra feature */
  .omra{position:relative;border-radius:24px;overflow:hidden;color:#fff;background:var(--teal-d);}
  .omra .bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.5;}
  .omra::after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,var(--teal-d) 32%,rgba(15,63,60,.6) 70%,rgba(15,63,60,.35));}
  html[lang="fr"] .omra::after{background:linear-gradient(250deg,var(--teal-d) 32%,rgba(15,63,60,.6) 70%,rgba(15,63,60,.35));}
  .omra .in{position:relative;z-index:2;max-width:34em;padding:clamp(34px,5vw,64px);}
  .omra .kicker{color:var(--gold-2);} .omra .kicker::before{background:var(--gold-2);}
  .omra h2{font-size:clamp(26px,3.6vw,40px);font-weight:800;margin-bottom:14px;}
  html[lang="fr"] .omra h2{font-family:var(--disp);font-weight:700;}
  .omra p{color:#d7e4e2;font-size:16px;font-weight:300;margin-bottom:14px;}
  html[lang="ar"] .omra p{font-weight:400;}
  .omra ul{list-style:none;display:grid;gap:10px;margin:18px 0 26px;}
  .omra li{display:flex;gap:11px;align-items:center;font-size:15px;}
  .omra li svg{width:20px;height:20px;stroke:var(--gold-2);flex:none;}

  /* services */
  .sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .svc{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:28px 24px;transition:transform .3s,box-shadow .3s,border-color .3s;}
  .svc:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--gold);}
  .svc .si{width:54px;height:54px;border-radius:14px;background:var(--teal-soft);display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
  .svc .si svg{width:26px;height:26px;stroke:var(--teal);}
  .svc h3{font-size:18.5px;font-weight:700;margin-bottom:8px;color:var(--ink);}
  html[lang="fr"] .svc h3{font-family:var(--body);font-weight:600;}
  .svc p{font-size:14px;color:var(--muted);font-weight:300;}
  html[lang="ar"] .svc p{font-weight:400;}

  /* why strip */
  .why{background:var(--teal-d);color:#eaf2f0;}
  .why .wgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;}
  .why .w{text-align:center;}
  .why .wi{width:60px;height:60px;border-radius:50%;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
  .why .wi svg{width:28px;height:28px;stroke:var(--gold-2);}
  .why h3{font-size:20px;color:#fff;margin-bottom:8px;}
  html[lang="fr"] .why h3{font-family:var(--disp);}
  .why p{color:#b9ccc8;font-size:14.5px;font-weight:300;}
  html[lang="ar"] .why p{font-weight:400;}

  /* contact */
  .cgrid{display:grid;grid-template-columns:.95fr 1.05fr;gap:18px;align-items:stretch;}
  .cinfo{background:var(--teal);color:#eaf2f0;border-radius:18px;padding:clamp(26px,3.5vw,40px);}
  .cinfo h3{color:#fff;font-size:26px;margin-bottom:6px;}
  html[lang="fr"] .cinfo h3{font-family:var(--disp);}
  .cinfo>p{color:#c3d6d3;font-size:14.5px;font-weight:300;margin-bottom:20px;}
  .cline{display:flex;gap:14px;align-items:center;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.13);}
  .cline:last-of-type{border-bottom:0;}
  .cline .ci{width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;flex:none;}
  .cline .ci svg{width:20px;height:20px;stroke:var(--gold-2);}
  .cline small{display:block;font-size:12px;color:#9fbbb6;}
  .cline b{font-weight:600;font-size:15.5px;color:#fff;}
  .cline b.ltr{direction:ltr;display:inline-block;}
  .cmap{margin-top:16px;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.16);position:relative;}
  .cmap iframe{width:100%;height:230px;border:0;display:block;filter:grayscale(.2);}
  .cmap-btn{position:absolute;inset-block-end:12px;inset-inline-end:12px;display:inline-flex;align-items:center;gap:7px;background:var(--gold);color:#fff;font-weight:700;font-size:13px;padding:9px 15px;border-radius:9px;box-shadow:0 6px 18px rgba(0,0,0,.25);}
  .cmap-btn:hover{background:var(--gold-d);}
  .cform{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:clamp(24px,3.5vw,36px);}
  .cform .fr{margin-bottom:15px;}
  .cform label{display:block;font-size:13.5px;font-weight:600;margin-bottom:7px;}
  .cform input,.cform select,.cform textarea{width:100%;border:1px solid var(--line);background:var(--cream);border-radius:11px;padding:13px 14px;font-family:inherit;font-size:14.5px;color:var(--txt);transition:border-color .2s,background .2s;}
  .cform input:focus,.cform select:focus,.cform textarea:focus{outline:none;border-color:var(--gold);background:#fff;}
  .cform textarea{resize:vertical;min-height:98px;}

  /* footer */
  footer{background:var(--ink);color:#bcc9c6;}
  .foot{padding-block:54px 0;display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:36px;}
  .foot .fb .chip{background:#fff;border-radius:12px;padding:9px 13px;display:inline-block;margin-bottom:14px;}
  .foot .fb .chip img{height:38px;}
  .foot .fb p{font-size:13.5px;color:#8fa19d;font-weight:300;max-width:30em;}
  .foot h5{font-size:13px;letter-spacing:.04em;color:#fff;margin-bottom:15px;font-weight:700;}
  html[lang="fr"] .foot h5{font-family:var(--disp);font-size:16px;}
  .foot a{display:block;color:#a7b6b3;font-size:13.5px;padding:5px 0;transition:color .2s;}
  .foot a:hover{color:var(--gold-2);}
  .foot-bottom{margin-top:42px;border-top:1px solid rgba(255,255,255,.1);padding:20px 0 28px;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:12.5px;color:#71817d;}

  @media(max-width:980px){
    .dgrid{grid-template-columns:repeat(2,1fr);}
    .sgrid{grid-template-columns:repeat(2,1fr);}
    .why .wgrid{grid-template-columns:1fr;gap:26px;}
    .cgrid{grid-template-columns:1fr;}
    .foot{grid-template-columns:1fr 1fr;}
  }
  @media(max-width:680px){
    nav.menu,.nav-cta{display:none;} .burger{display:flex;}
    .dgrid{grid-template-columns:1fr;} .dest{aspect-ratio:16/11;}
    .sgrid{grid-template-columns:1fr;}
    .foot{grid-template-columns:1fr;}
    .hero{min-height:auto;margin-top:-104px;padding-top:104px;}
    .hero-in{padding-block:36px 54px;}
    .nav-in{height:64px;}
  }
  @media(max-width:480px){
    .topbar a.topglass{display:none;}
    .hero-cta{flex-direction:column;align-items:stretch;} .hero-cta .btn{width:100%;}
    .block{padding-block:48px;} .head{margin-bottom:28px;}
    .brand .chip img{height:28px;}
    .hero-phones{gap:12px;flex-direction:column;}
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="ov" style="position:fixed"></div>

function sendWA(){
 const n=document.getElementById('c-name').value.trim(),te=document.getElementById('c-tel').value.trim(),d=document.getElementById('c-dest').value,m=document.getElementById('c-msg').value.trim();
 const L=T[LANG];
 const msg=`*${L.msg_head}*%0A${L.c_name}: ${n||'-'}%0A${L.c_tel}: ${te||'-'}%0A${L.c_dest}: ${d}%0A${L.c_msg}: ${m||'-'}`;
 window.open(`https://wa.me/${WA}?text=${msg}`,'_blank');
}

function render(){
 document.documentElement.lang=LANG;
 document.documentElement.dir=LANG==='ar'?'rtl':'ltr';
 document.getElementById('root').innerHTML=Header()+Hero()+Destinations()+Omra()+Services()+Why()+Contact()+Footer();
 wire();
}
function setLang(l){LANG=l;render();window.scrollTo(0,0);}
function wire(){
 const nav=document.getElementById('nav');
 const onScroll=()=>nav.classList.toggle('scrolled',window.scrollY>40);
 onScroll();window.removeEventListener('scroll',window.__sc||(()=>{}));window.__sc=onScroll;window.addEventListener('scroll',onScroll,{passive:true});
 const burger=document.getElementById('burger'),mob=document.getElementById('mob');
 burger.onclick=()=>{mob.style.display=mob.style.display==='block'?'none':'block';};
 mob.querySelectorAll('a').forEach(a=>a.onclick=()=>mob.style.display='none');
 document.querySelectorAll('.langbtn').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
 const ws=document.getElementById('waSend'); if(ws) ws.addEventListener('click',sendWA);
 const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.1});
 document.querySelectorAll('[data-reveal]').forEach(el=>io.observe(el));
}
render();
