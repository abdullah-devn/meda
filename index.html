<!DOCTYPE html>
<html lang="ar" dir="rtl" translate="no" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>مدى فوياج · Meda Voyages — احجز رحلتك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#1B5E5A; --teal-d:#0F3F3C; --teal-2:#247470;
    --gold:#BE9540; --gold-2:#D8B968; --gold-d:#9A772E; --gold-soft:#be95400f;
    --cream:#F6F1E7; --cream-2:#EEE6D5; --paper:#FFFFFF; --ink:#16201E;
    --txt:#1E2A28; --muted:#5E6E6A; --line:#E2D9C7; --ok:#1F7A52;
    --maxw:1180px; --pad:clamp(18px,4.5vw,60px);
    --disp:'Cormorant Garamond',serif; --body:'Jost',sans-serif; --ara:'Tajawal',sans-serif;
    --shadow:0 16px 40px rgba(15,40,38,.10); --shadow-lg:0 30px 70px rgba(15,40,38,.18);
    --r:16px;
  }
  html[lang="ar"]{--body:'Tajawal',sans-serif;--disp:'Tajawal',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:var(--body);background:var(--cream);color:var(--txt);line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  a{color:inherit;text-decoration:none;} img{display:block;max-width:100%;} button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--gold);color:#fff;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding-inline:var(--pad);}
  h1,h2,h3{line-height:1.15;font-weight:700;}
  html[lang="fr"] h1,html[lang="fr"] h2{font-family:var(--disp);font-weight:600;letter-spacing:.01em;}
  :focus-visible{outline:2px solid var(--gold);outline-offset:3px;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto;}}
  [data-reveal]{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s cubic-bezier(.2,.7,.2,1);}
  [data-reveal].in{opacity:1;transform:none;}
  section[id]{scroll-margin-top:76px;}

  .compass{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:50%;border:1.5px solid var(--gold);position:relative;flex:none;}
  .compass::before{content:"";position:absolute;inset:5px;border-radius:50%;border:1px dashed var(--gold);opacity:.5;}
  .compass svg{width:22px;height:22px;stroke:var(--gold-d);position:relative;}

  .topbar{background:var(--teal-d);color:#cfe0dd;font-size:12.5px;position:relative;z-index:70;}
  .topbar .in{display:flex;align-items:center;gap:16px;height:38px;justify-content:flex-end;}
  .topbar .lang{display:flex;border:1px solid rgba(255,255,255,.2);border-radius:7px;overflow:hidden;}
  .topbar .lang button{background:none;border:0;color:#bcd3cf;font-weight:700;font-size:12px;padding:5px 11px;transition:.2s;min-height:28px;}
  .topbar .lang button.on{color:#fff;background:var(--teal);}

  header.nav{position:sticky;top:0;z-index:60;background:rgba(246,241,231,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  .nav-in{display:flex;align-items:center;gap:14px;height:68px;}
  .brand{display:flex;align-items:center;gap:11px;flex:none;}
  .brand .chip{width:46px;height:46px;border-radius:12px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;overflow:hidden;padding:5px;}
  .brand .chip img{width:100%;height:100%;object-fit:contain;}
  .brand .bn{display:flex;flex-direction:column;line-height:1.16;}
  .brand .bn b{font-size:15px;color:var(--teal-d);font-weight:800;}
  .brand .bn span{font-size:10px;color:var(--muted);letter-spacing:.02em;}
  nav.menu{display:flex;gap:2px;margin-inline-start:10px;}
  nav.menu a{font-size:13.5px;font-weight:600;color:#33433f;padding:9px 12px;border-radius:9px;transition:.2s;cursor:pointer;}
  nav.menu a:hover{color:var(--teal);background:var(--cream-2);}
  .nav-cta{margin-inline-start:auto;display:inline-flex;align-items:center;gap:8px;background:var(--teal);color:#fff;font-weight:700;font-size:13.5px;padding:11px 18px;border-radius:10px;transition:.2s;flex:none;}
  .nav-cta:hover{background:var(--teal-d);transform:translateY(-1px);}
  .nav-cta svg{width:16px;height:16px;stroke:#fff;}
  .burger{display:none;width:44px;height:44px;border:1px solid var(--line);border-radius:11px;background:#fff;align-items:center;justify-content:center;flex:none;}
  .burger svg{width:20px;height:20px;stroke:var(--ink);}
  .mob{display:none;background:var(--teal-d);}
  .mob a{display:block;padding:14px var(--pad);color:#e7efed;border-bottom:1px solid rgba(255,255,255,.1);font-weight:600;}

  .hero{position:relative;background:linear-gradient(160deg,var(--teal-d),var(--teal) 60%,var(--teal-2));color:#fff;overflow:hidden;}
  .hero::before{content:"";position:absolute;inset:0;background:radial-gradient(900px 380px at 80% -10%,rgba(216,185,104,.22),transparent 60%);pointer-events:none;}
  .hero .wrap{position:relative;padding-block:clamp(34px,6vw,58px) clamp(120px,16vw,150px);}
  .heyebrow{display:inline-flex;align-items:center;gap:9px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);padding:7px 14px;border-radius:100px;font-size:12.5px;font-weight:600;margin-bottom:20px;}
  .heyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--gold-2);box-shadow:0 0 0 4px rgba(216,185,104,.25);}
  .hero h1{font-size:clamp(27px,4.4vw,46px);font-weight:800;letter-spacing:-.01em;max-width:16ch;}
  html[lang="fr"] .hero h1{font-family:var(--disp);font-weight:700;}
  .hero h1 .g{color:var(--gold-2);}
  .hero p.sub{font-size:clamp(14.5px,1.7vw,17px);color:rgba(255,255,255,.82);font-weight:300;margin-top:14px;max-width:42ch;}
  html[lang="ar"] .hero p.sub{font-weight:400;}

  .searchcard{position:relative;margin-top:30px;background:#fff;color:var(--txt);border-radius:20px;box-shadow:var(--shadow-lg);padding:8px;}
  .svc-tabs{display:flex;gap:4px;flex-wrap:wrap;padding:8px 8px 0;}
  .svc-tab{display:inline-flex;align-items:center;gap:8px;border:0;background:transparent;color:var(--muted);font-weight:700;font-size:13.5px;padding:11px 15px;border-radius:11px 11px 0 0;transition:.2s;}
  .svc-tab svg{width:17px;height:17px;stroke:currentColor;}
  .svc-tab:hover{color:var(--teal);background:var(--cream);}
  .svc-tab.on{color:var(--teal);background:var(--cream-2);}
  .svc-body{background:var(--cream-2);border-radius:14px;padding:clamp(14px,2.4vw,20px);}
  .svc-top{padding:0 2px 12px;}
  .trip-toggle{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:100px;padding:3px;gap:2px;}
  .trip-toggle .trip{border:0;background:transparent;color:var(--muted);font-weight:700;font-size:12.5px;padding:8px 16px;border-radius:100px;transition:.2s;}
  .trip-toggle .trip.on{background:var(--teal);color:#fff;}
  .fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;align-items:end;}
  .fl{display:flex;flex-direction:column;gap:6px;min-width:0;}
  .fl label{font-size:12px;font-weight:700;color:var(--teal-d);display:flex;align-items:center;gap:6px;}
  .fl label svg{width:13px;height:13px;stroke:var(--gold-d);}
  .fl select,.fl input{width:100%;border:1px solid var(--line);background:#fff;border-radius:11px;padding:13px;font-family:inherit;font-size:14px;color:var(--txt);transition:.2s;min-height:48px;}
  .fl select:focus,.fl input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(190,149,64,.15);}
  .search-btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;background:var(--gold);color:#fff;font-weight:800;font-size:14.5px;border:0;border-radius:12px;padding:0 22px;min-height:48px;transition:.2s;white-space:nowrap;grid-column:1/-1;}
  .search-btn:hover{background:var(--gold-d);transform:translateY(-1px);}
  .search-btn svg{width:18px;height:18px;stroke:#fff;}

  .pax-wrap{position:relative;}
  .pax-toggle{width:100%;display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;border-radius:11px;padding:0 13px;min-height:48px;font-family:inherit;font-size:14px;color:var(--txt);font-weight:600;}
  .pax-toggle .u{width:16px;height:16px;stroke:var(--gold-d);flex:none;}
  .pax-toggle .c{margin-inline-start:auto;width:15px;height:15px;stroke:var(--muted);flex:none;}
  .pax-toggle span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pax-panel{position:absolute;top:calc(100% + 6px);inset-inline-start:0;inset-inline-end:0;min-width:250px;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);padding:14px;z-index:30;display:none;}
  .pax-panel.open{display:block;}
  .pax-line{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:9px 0;}
  .pax-info b{display:block;font-size:14px;color:var(--ink);}
  .pax-info span{font-size:11.5px;color:var(--muted);}
  .stepper{display:flex;align-items:center;gap:10px;}
  .stepper button{width:32px;height:32px;border:1px solid var(--line);background:var(--cream);color:var(--teal-d);border-radius:9px;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:.15s;}
  .stepper button:hover{background:var(--teal);color:#fff;border-color:var(--teal);}
  .stepper b{min-width:18px;text-align:center;font-weight:800;font-size:15px;}
  .ages{display:grid;grid-template-columns:1fr 1fr;gap:8px;border-top:1px dashed var(--line);margin-top:8px;padding-top:10px;}
  .age-fl{display:flex;flex-direction:column;gap:4px;}
  .age-fl label{font-size:11px;font-weight:700;color:var(--muted);}
  .age-fl select{border:1px solid var(--line);background:var(--cream);border-radius:8px;padding:8px;font-family:inherit;font-size:13px;}
  .pax-done{width:100%;margin-top:10px;background:var(--teal-d);color:#fff;border:0;border-radius:10px;padding:11px;font-weight:700;font-size:13.5px;}

  .estimate{margin-top:16px;border-radius:14px;border:1px dashed var(--gold);background:var(--gold-soft);padding:18px;display:none;}
  .estimate.show{display:block;}
  .est-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .est-route{font-weight:800;color:var(--teal-d);font-size:16px;}
  .est-price{margin-inline-start:auto;text-align:end;}
  .est-price .from{font-size:11px;color:var(--muted);display:block;}
  .est-price b{font-family:var(--disp);font-size:26px;color:var(--teal-d);line-height:1;}
  html[lang="ar"] .est-price b{font-family:var(--ara);}
  .est-price b span{font-size:13px;color:var(--muted);font-weight:600;}
  .est-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;}
  .est-chip{background:#fff;border:1px solid var(--line);border-radius:100px;font-size:11.5px;font-weight:600;color:var(--teal-d);padding:5px 11px;}
  .est-note{font-size:12px;color:var(--muted);margin-top:11px;display:flex;align-items:center;gap:7px;}
  .est-note svg{width:14px;height:14px;stroke:var(--gold-d);flex:none;}
  .bk-form{margin-top:16px;border-top:1px dashed var(--gold);padding-top:16px;}
  .bk-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .bk-fl{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
  .bk-fl label{font-size:12.5px;font-weight:700;color:var(--teal-d);}
  .bk-fl input,.bk-fl textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:10px;padding:12px 13px;font-family:inherit;font-size:14px;color:var(--txt);transition:.2s;}
  .bk-fl input:focus,.bk-fl textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(190,149,64,.13);}
  .bk-fl textarea{resize:vertical;min-height:74px;}
  .bk-done{display:flex;align-items:center;gap:13px;padding:6px 2px;}
  .bk-done svg{width:34px;height:34px;flex:none;}
  .bk-done b{display:block;font-size:15.5px;color:var(--teal-d);}
  .bk-done span{font-size:13px;color:var(--muted);}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-weight:700;font-size:14px;padding:13px 20px;border-radius:11px;border:1px solid transparent;transition:transform .2s,background .2s,color .2s;}
  .btn svg{width:17px;height:17px;}
  .btn-teal{background:var(--teal);color:#fff;} .btn-teal:hover{background:var(--teal-d);transform:translateY(-2px);}
  .btn-gold{background:var(--gold);color:#fff;} .btn-gold:hover{background:var(--gold-d);transform:translateY(-2px);}

  .trust{position:relative;margin-top:-72px;z-index:5;}
  .trust .row{background:#fff;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);display:grid;grid-template-columns:repeat(4,1fr);overflow:hidden;}
  .trust .it{display:flex;align-items:center;gap:11px;padding:18px 20px;border-inline-end:1px solid var(--line);}
  .trust .it:last-child{border-inline-end:0;}
  .trust .it svg{width:24px;height:24px;stroke:var(--teal);flex:none;}
  .trust .it b{display:block;font-size:14px;color:var(--ink);}
  .trust .it span{font-size:11.5px;color:var(--muted);}

  .block{padding-block:clamp(44px,7vw,80px);}
  .shead{margin-bottom:30px;max-width:44ch;}
  .shead.center{margin-inline:auto;text-align:center;}
  .kicker{display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.05em;color:var(--gold-d);font-weight:700;text-transform:uppercase;margin-bottom:11px;}
  .kicker::before{content:"";width:18px;height:2px;background:var(--gold);border-radius:2px;}
  .shead.center .kicker{justify-content:center;}
  h2.title{font-size:clamp(23px,3.4vw,35px);color:var(--teal-d);letter-spacing:-.01em;}
  .lead{font-size:clamp(14.5px,1.6vw,16.5px);color:var(--muted);margin-top:11px;font-weight:300;}
  html[lang="ar"] .lead{font-weight:400;}

  .sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;}
  .scard{position:relative;background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:24px 22px;overflow:hidden;transition:transform .25s,box-shadow .25s,border-color .25s;cursor:pointer;}
  .scard:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--gold);}
  .scard .ghost{position:absolute;inset-block-start:-12px;inset-inline-end:-12px;color:var(--teal);opacity:.05;pointer-events:none;}
  .scard .ghost svg{width:104px;height:104px;}
  .scard .si{width:30px;height:30px;margin-bottom:14px;}
  .scard .si svg{width:30px;height:30px;stroke:var(--gold-d);}
  .scard h3{font-size:17px;font-weight:800;color:var(--ink);margin-bottom:6px;}
  html[lang="fr"] .scard h3{font-family:var(--body);font-weight:800;}
  .scard p{font-size:13px;color:var(--muted);}
  .scard .go{margin-top:13px;display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--teal);}
  .scard .go svg{width:15px;height:15px;stroke:var(--teal);}

  .darrows{display:flex;gap:8px;justify-content:flex-end;margin-bottom:14px;}
  .darrows button{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--teal-d);display:flex;align-items:center;justify-content:center;transition:.2s;}
  .darrows button:hover{background:var(--teal);color:#fff;border-color:var(--teal);}
  .darrows button svg{width:18px;height:18px;stroke:currentColor;}
  .dscroll{display:flex;gap:16px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:8px;}
  .dscroll::-webkit-scrollbar{height:6px;} .dscroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px;}
  .dcard{position:relative;flex:0 0 300px;scroll-snap-align:start;border-radius:var(--r);overflow:hidden;aspect-ratio:3/3.5;box-shadow:var(--shadow);cursor:pointer;}
  @media(max-width:620px){.dcard{flex:0 0 80%;}}
  .dcard img{width:100%;height:100%;object-fit:cover;transition:transform .6s;}
  .dcard:hover img{transform:scale(1.06);}
  .dcard::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(15,40,38,.9) 10%,rgba(15,40,38,.2) 55%,transparent);}
  .dcard .body{position:absolute;inset-inline:0;bottom:0;padding:20px;color:#fff;z-index:2;}
  .dcard .body .ct{font-size:11px;color:var(--gold-2);font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:6px;}
  .dcard .body .ct svg{width:14px;height:14px;stroke:var(--gold-2);}
  .dcard .body h3{font-size:21px;font-weight:800;margin-bottom:5px;}
  html[lang="fr"] .dcard .body h3{font-family:var(--disp);}
  .dcard .body p{font-size:12.5px;color:rgba(255,255,255,.85);font-weight:300;line-height:1.55;}
  html[lang="ar"] .dcard .body p{font-weight:400;}

  .omra{position:relative;border-radius:22px;overflow:hidden;background:linear-gradient(135deg,var(--teal-d),var(--teal));color:#fff;padding:clamp(28px,5vw,52px);}
  .omra::before{content:"";position:absolute;inset:0;background:radial-gradient(600px 300px at 12% 120%,rgba(216,185,104,.25),transparent 60%);}
  .omra .in{position:relative;display:grid;grid-template-columns:1.3fr 1fr;gap:30px;align-items:center;}
  .omra .kicker{color:var(--gold-2);}
  .omra h2{font-size:clamp(23px,3.4vw,34px);font-weight:800;margin-bottom:12px;}
  html[lang="fr"] .omra h2{font-family:var(--disp);font-weight:700;}
  .omra p{color:rgba(255,255,255,.85);font-size:15px;font-weight:300;margin-bottom:18px;}
  html[lang="ar"] .omra p{font-weight:400;}
  .omra ul{list-style:none;display:grid;gap:11px;}
  .omra li{display:flex;align-items:center;gap:11px;font-size:14.5px;}
  .omra li svg{width:20px;height:20px;stroke:var(--gold-2);flex:none;}
  .omra .card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:var(--r);padding:24px;}
  .omra .card h3{font-size:18px;margin-bottom:6px;}
  .omra .card .pr{font-family:var(--disp);font-size:30px;color:var(--gold-2);margin:8px 0 4px;}
  html[lang="ar"] .omra .card .pr{font-family:var(--ara);}
  .omra .card .pr span{font-size:13px;color:rgba(255,255,255,.7);}

  .ads{background:var(--cream-2);border-block:1px solid var(--line);}
  .ads .in{padding-block:30px;}
  .ads .at{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--gold-d);letter-spacing:.04em;text-transform:uppercase;margin-bottom:14px;justify-content:center;}
  .ads .at svg{width:15px;height:15px;stroke:var(--gold-d);}
  .ads .arow{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .adcard{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 16px;min-width:210px;}
  .adcard .ad-ic{width:34px;height:34px;border-radius:9px;background:var(--gold-soft);display:flex;align-items:center;justify-content:center;flex:none;}
  .adcard .ad-ic svg{width:18px;height:18px;stroke:var(--gold-d);}
  .adcard b{display:block;font-size:13.5px;color:var(--ink);}
  .adcard span{font-size:11.5px;color:var(--muted);}

  footer{background:var(--ink);color:#b6c2bf;}
  .foot{padding-block:44px 0;display:grid;grid-template-columns:1.6fr 1fr 1.2fr;gap:30px;}
  .foot .fb{display:flex;align-items:center;gap:11px;margin-bottom:13px;}
  .foot .fb .chip{width:44px;height:44px;border-radius:11px;background:#fff;display:flex;align-items:center;justify-content:center;padding:5px;}
  .foot .fb .chip img{width:100%;height:100%;object-fit:contain;}
  .foot .fb b{color:#fff;font-size:15px;}
  .foot p{font-size:13px;color:#90a09c;font-weight:300;max-width:30ch;}
  html[lang="ar"] .foot p{font-weight:400;}
  .foot h5{font-size:12.5px;color:#fff;margin-bottom:13px;font-weight:700;}
  .foot a{display:block;color:#b6c2bf;font-size:13.5px;padding:5px 0;transition:.2s;cursor:pointer;}
  .foot a:hover{color:var(--gold-2);}
  .foot-bottom{margin-top:34px;border-top:1px solid rgba(255,255,255,.1);padding:18px 0 26px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-size:12px;color:#76847f;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--teal-d);color:#fff;padding:13px 22px;border-radius:12px;font-weight:600;font-size:14px;z-index:300;opacity:0;transition:.3s;display:flex;align-items:center;gap:9px;box-shadow:var(--shadow-lg);pointer-events:none;}
  .toast svg{width:18px;height:18px;}

  /* tracker */
  .trackbox{max-width:620px;margin:0 auto;}
  .trk-in{display:flex;gap:10px;}
  .trk-in input{flex:1;border:1px solid var(--line);background:#fff;border-radius:11px;padding:14px;font-family:inherit;font-size:14px;text-align:center;letter-spacing:.02em;}
  .trk-in input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(190,149,64,.13);}
  .trk-in .btn{white-space:nowrap;}
  .trk-res{margin-top:16px;}
  .trk-none{background:#fff;border:1px dashed var(--line);border-radius:12px;padding:20px;text-align:center;color:var(--muted);font-size:13.5px;}
  .trk-card{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow);}
  .trk-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .trk-head b{font-family:var(--disp);font-size:17px;color:var(--teal-d);}
  html[lang="ar"] .trk-head b{font-family:var(--ara);font-weight:800;}
  .trk-flow{display:flex;align-items:center;gap:6px;margin-bottom:16px;}
  .trk-step{display:flex;flex-direction:column;align-items:center;gap:7px;flex:none;width:84px;text-align:center;}
  .trk-step .dot{width:34px;height:34px;border-radius:50%;background:var(--cream-2);color:var(--muted);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;border:2px solid var(--line);}
  .trk-step .dot svg{width:16px;height:16px;stroke:#fff;}
  .trk-step .lb{font-size:11.5px;color:var(--muted);font-weight:600;}
  .trk-step.on .dot{background:var(--teal);border-color:var(--teal);color:#fff;}
  .trk-step.now .dot{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 4px rgba(190,149,64,.2);}
  .trk-step.on .lb{color:var(--teal-d);}
  .trk-bar{flex:1;height:2px;background:var(--line);min-width:14px;}
  .trk-msg{font-size:14px;color:var(--txt);background:var(--gold-soft);border-radius:10px;padding:13px 15px;text-align:center;}

  .admin.show{display:block;}
  .ashell{display:flex;min-height:100vh;}
  .aside{width:232px;flex:none;background:var(--teal-d);color:#cfe0dd;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .aside-top{display:flex;align-items:center;gap:11px;padding:18px 18px;border-bottom:1px solid rgba(255,255,255,.1);}
  .aside-top .chip{width:40px;height:40px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;padding:5px;flex:none;}
  .aside-top .chip img{width:100%;height:100%;object-fit:contain;}
  .aside-top b{color:#fff;font-size:14px;display:block;}
  .aside-top small{font-size:11px;color:rgba(255,255,255,.55);}
  .anav-list{display:flex;flex-direction:column;gap:3px;padding:14px 12px;flex:1;}
  .anav{display:flex;align-items:center;gap:11px;width:100%;background:transparent;border:0;color:#bcd3cf;font-family:inherit;font-weight:600;font-size:14px;padding:12px 13px;border-radius:11px;transition:.18s;text-align:start;}
  .anav svg{width:18px;height:18px;stroke:currentColor;flex:none;}
  .anav:hover{background:rgba(255,255,255,.08);color:#fff;}
  .anav.on{background:var(--gold);color:#fff;}
  .aside-bot{padding:12px;border-top:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;gap:3px;}
  .aside-bot .out{color:#e7b4b4;}
  .amain{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--cream);}
  .atop{display:flex;align-items:center;gap:12px;background:#fff;border-bottom:1px solid var(--line);padding:16px clamp(18px,3vw,30px);position:sticky;top:0;z-index:4;}
  .atop b{font-size:17px;color:var(--teal-d);}
  .aham{display:none;width:40px;height:40px;border:1px solid var(--line);border-radius:10px;background:#fff;align-items:center;justify-content:center;}
  .aham svg{width:18px;height:18px;stroke:var(--ink);}
  .adm-note{margin-inline-start:auto;display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--gold-d);background:var(--gold-soft);padding:6px 12px;border-radius:100px;}
  .adm-note svg{width:13px;height:13px;stroke:var(--gold-d);}
  .apage{padding:clamp(18px,3vw,30px);max-width:980px;width:100%;}
  .apage-d{color:var(--muted);font-size:14px;margin-bottom:18px;}
  .astats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:22px;}
  .astat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;display:flex;align-items:center;gap:13px;position:relative;}
  .astat .ic{width:42px;height:42px;border-radius:11px;background:var(--cream-2);display:flex;align-items:center;justify-content:center;flex:none;}
  .astat .ic svg{width:20px;height:20px;stroke:var(--teal);}
  .astat .v{font-family:var(--disp);font-size:26px;color:var(--teal-d);line-height:1;}
  html[lang="ar"] .astat .v{font-family:var(--ara);font-weight:800;}
  .astat .l{font-size:12px;color:var(--muted);margin-top:4px;}
  .astat .sub{position:absolute;top:12px;inset-inline-end:14px;font-size:10.5px;color:var(--muted);background:var(--cream);padding:3px 8px;border-radius:100px;}
  .astat.hl{background:linear-gradient(135deg,var(--teal-d),var(--teal));border:0;}
  .astat.hl .ic{background:rgba(255,255,255,.14);} .astat.hl .ic svg{stroke:var(--gold-2);}
  .astat.hl .v{color:#fff;} .astat.hl .l{color:rgba(255,255,255,.7);} .astat.hl .sub{background:rgba(255,255,255,.15);color:#fff;}
  .astat.p{border-top:3px solid var(--gold);} .astat.dn{border-top:3px solid var(--ok);}
  .acard{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:22px;margin-bottom:18px;}
  .acard h3{color:var(--teal-d);font-size:16px;margin-bottom:14px;}
  .acard-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .acard-h h3{margin:0;}
  .lnk{background:none;border:0;color:var(--teal);font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:5px;}
  .lnk svg{width:14px;height:14px;stroke:var(--teal);}
  .afilters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .afilters button{background:#fff;border:1px solid var(--line);color:var(--muted);font-weight:700;font-size:13px;padding:9px 15px;border-radius:100px;transition:.2s;}
  .afilters button.on{background:var(--teal-d);color:#fff;border-color:var(--teal-d);}
  .otable{display:flex;flex-direction:column;gap:11px;}
  .orow{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;}
  .orow.mini{grid-template-columns:auto 1fr;}
  .orow .oid{font-family:var(--disp);font-size:13px;color:var(--gold-d);font-weight:800;}
  html[lang="ar"] .orow .oid{font-family:var(--ara);}
  .orow .omain b{font-size:15px;color:var(--ink);display:block;}
  .orow .omain .meta{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .orow .omain .meta span{display:inline-block;margin-inline-end:12px;}
  .orow .omain .meta.det{margin-top:5px;color:var(--txt);}
  .orow .oright{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;}
  .badge{font-size:11.5px;font-weight:800;padding:5px 11px;border-radius:100px;white-space:nowrap;}
  .badge.pending{background:#be95401f;color:var(--gold-d);}
  .badge.processing{background:#2474701f;color:var(--teal-2);}
  .badge.done{background:#1f7a521f;color:var(--ok);}
  .ostatus{display:flex;gap:5px;}
  .ostatus button{border:1px solid var(--line);background:var(--cream);color:var(--muted);border-radius:8px;padding:7px 10px;font-size:11.5px;font-weight:700;transition:.15s;}
  .ostatus button:hover{border-color:var(--teal);color:var(--teal-d);}
  .ostatus button.on{background:var(--teal);color:#fff;border-color:var(--teal);}
  .odel{border:0;background:transparent;color:#b04a4a;font-size:12px;font-weight:700;padding:6px 8px;}
  .odel:hover{text-decoration:underline;}
  .aempty{text-align:center;padding:40px 20px;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:14px;}
  .plist{display:flex;flex-direction:column;gap:10px;}
  .prow{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px solid var(--line);}
  .prow:last-child{border-bottom:0;}
  .prow .pname{font-size:14px;font-weight:600;color:var(--ink);}
  .pin{display:flex;align-items:center;gap:8px;}
  .pin input{width:130px;border:1px solid var(--line);background:var(--cream);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:14px;text-align:end;font-weight:700;color:var(--teal-d);}
  .pin input:focus{outline:none;border-color:var(--gold);background:#fff;}
  .pin .cur{font-size:12px;color:var(--muted);min-width:42px;}
  .offgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .ofl{display:flex;flex-direction:column;gap:6px;}
  .ofl.full,.offgrid .btn.full{grid-column:1/-1;}
  .ofl label{font-size:12.5px;font-weight:700;color:var(--teal-d);}
  .ofl input{border:1px solid var(--line);background:var(--cream);border-radius:10px;padding:12px 13px;font-family:inherit;font-size:14px;}
  .ofl input:focus{outline:none;border-color:var(--gold);background:#fff;}
  .upl{display:flex;align-items:center;gap:10px;}
  .upl-btn{display:inline-flex;align-items:center;gap:7px;border:1px dashed var(--gold);background:var(--gold-soft);color:var(--gold-d);font-weight:700;font-size:13px;padding:11px 15px;border-radius:10px;}
  .upl-btn svg{width:15px;height:15px;stroke:var(--gold-d);}
  .upl-name{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .offlist{display:flex;flex-direction:column;gap:10px;}
  .offrow{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 16px;}
  .offrow .off-ic{width:44px;height:44px;border-radius:10px;background:var(--gold-soft);display:flex;align-items:center;justify-content:center;flex:none;}
  .offrow .off-ic svg{width:20px;height:20px;stroke:var(--gold-d);}
  .offrow .off-img{width:54px;height:44px;border-radius:9px;overflow:hidden;flex:none;background:var(--cream-2);}
  .offrow .off-img img{width:100%;height:100%;object-fit:cover;}
  .offrow .off-tx{flex:1;} .offrow .off-tx b{display:block;font-size:14px;color:var(--ink);} .offrow .off-tx span{font-size:12px;color:var(--muted);}
  .disc{display:inline-block;background:#d8463b;color:#fff;font-size:11px;font-weight:800;padding:2px 8px;border-radius:100px;margin-inline-start:6px;}
  .setgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .setgrid .full{grid-column:1/-1;}
  .acc{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
  .acc:last-child{border-bottom:0;}
  .acc-ic{width:38px;height:38px;border-radius:10px;background:var(--cream-2);display:flex;align-items:center;justify-content:center;flex:none;}
  .acc-ic svg{width:18px;height:18px;stroke:var(--teal);}
  .acc b{display:block;font-size:14px;color:var(--ink);} .acc span{font-size:12px;color:var(--muted);}
  .ad-disc{display:inline-block;background:#d8463b;color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:100px;margin-inline-start:4px;}
  .adcard .ad-img{width:42px;height:42px;border-radius:9px;overflow:hidden;flex:none;}
  .adcard .ad-img img{width:100%;height:100%;object-fit:cover;}
  .alogin{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .alogin .box{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-lg);padding:clamp(26px,4vw,40px);width:100%;max-width:380px;text-align:center;}
  .alogin .chip{width:60px;height:60px;border-radius:15px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;padding:7px;margin:0 auto 16px;}
  .alogin .chip img{width:100%;height:100%;object-fit:contain;}
  .alogin h2{font-size:21px;color:var(--teal-d);margin-bottom:5px;}
  .alogin p{font-size:13px;color:var(--muted);margin-bottom:20px;}
  .alogin input{width:100%;border:1px solid var(--line);background:var(--cream);border-radius:11px;padding:13px;font-family:inherit;font-size:15px;text-align:center;margin-bottom:12px;}
  .alogin input:focus{outline:none;border-color:var(--gold);background:#fff;}
  .alogin .err{color:#b04a4a;font-size:12.5px;margin-bottom:10px;min-height:16px;}
  .alogin .hint{font-size:11.5px;color:var(--muted);margin-top:14px;}

  @media(max-width:1000px){
    .trust .row{grid-template-columns:1fr 1fr;} .trust .it:nth-child(2){border-inline-end:0;}
    .sgrid{grid-template-columns:repeat(2,1fr);}
    .omra .in{grid-template-columns:1fr;}
    .astats{grid-template-columns:1fr 1fr;}
  }
  @media(max-width:620px){
    nav.menu,.nav-cta{display:none;} .burger{display:flex;}
    .trust{margin-top:-40px;} .trust .row{grid-template-columns:1fr;}
    .trust .it{border-inline-end:0;border-bottom:1px solid var(--line);} .trust .it:last-child{border-bottom:0;}
    .sgrid{grid-template-columns:1fr;}
    .bk-row{grid-template-columns:1fr;}
    .foot{grid-template-columns:1fr;}
    .brand .bn{display:none;}
    .est-price{margin-inline-start:0;text-align:start;width:100%;}
    .orow{grid-template-columns:1fr;} .orow .oright{justify-content:flex-start;}
    .offadd{grid-template-columns:1fr;}
  }
</style>

/* ---------------- search ---------------- */
function destOpts(){return DEST.map(d=>`<option value="${d.k}">${LANG==='ar'?d.ar:d.fr}</option>`).join('');}
function visaOpts(){return VISA.map((v,i)=>`<option value="${i}">${LANG==='ar'?v.ar:v.fr}</option>`).join('');}
function paxSummary(){
 const L=T[LANG];
 let s=ADULTS+' '+(ADULTS===1?L.w_adult:L.w_adults);
 if(CHILDREN>0)s+=' · '+CHILDREN+' '+(CHILDREN===1?L.w_child:L.w_children);
 return s;
}
function paxPanel(){
 const L=T[LANG];
 let ages='';
 for(let i=0;i<CHILDREN;i++){
   let opts='';
   for(let a=2;a<=11;a++)opts+=`<option value="${a}" ${CHILD_AGES[i]==a?'selected':''}>${a} ${L.f_year}</option>`;
   ages+=`<div class="age-fl"><label>${L.f_childage} ${i+1}</label><select data-childage="${i}">${opts}</select></div>`;
 }
 return `<div class="pax-panel" id="paxPanel">
   <div class="pax-line"><div class="pax-info"><b>${L.f_adults}</b><span>${L.f_adults_d}</span></div>
     <div class="stepper"><button type="button" data-pax="adults" data-d="-1">−</button><b id="px-a">${ADULTS}</b><button type="button" data-pax="adults" data-d="1">+</button></div></div>
   <div class="pax-line"><div class="pax-info"><b>${L.f_children}</b><span>${L.f_children_d}</span></div>
     <div class="stepper"><button type="button" data-pax="children" data-d="-1">−</button><b id="px-c">${CHILDREN}</b><button type="button" data-pax="children" data-d="1">+</button></div></div>
   ${ages?`<div class="ages">${ages}</div>`:''}
   <button type="button" class="pax-done" id="paxDone">${L.f_done}</button>
 </div>`;
}
function paxField(){
 return `<div class="fl pax-wrap"><label>${sv('user')} ${t('f_pax')}</label>
   <button type="button" class="pax-toggle" id="paxToggle">${sv('user',' class="u"')}<span id="paxSum">${paxSummary()}</span>${sv('chev',' class="c"')}</button>
   ${paxPanel()}
 </div>`;
}
function dateField(id,lbl){return `<div class="fl"><label>${sv('cal')} ${lbl}</label><input type="date" id="${id}"></div>`;}
function cabinField(){
 return `<div class="fl"><label>${sv('seat')} ${t('f_cabin')}</label><select id="q-cabin">
   <option value="economy">${t('cab_eco')}</option><option value="prem">${t('cab_prem')}</option>
   <option value="biz">${t('cab_biz')}</option><option value="first">${t('cab_first')}</option></select></div>`;
}
function SearchCard(){
 const tabs=[['flight','ticket','svc_flight'],['omra','kaaba','svc_omra'],['visa','visa','svc_visa'],['hotel','bed','svc_hotel']]
   .map(([k,ic,l])=>`<button type="button" class="svc-tab ${SERVICE===k?'on':''}" data-svc="${k}">${sv(ic)} ${t(l)}</button>`).join('');
 const calc=`<button class="search-btn" id="calcBtn">${sv('flash')} ${t('search')}</button>`;
 let top='', fields='';
 if(SERVICE==='flight'){
   top=`<div class="trip-toggle"><button type="button" class="trip ${TRIP==='round'?'on':''}" data-trip="round">${t('f_round')}</button><button type="button" class="trip ${TRIP==='oneway'?'on':''}" data-trip="oneway">${t('f_oneway')}</button></div>`;
   fields=`<div class="fl"><label>${sv('plane')} ${t('f_from')}</label><input type="text" value="${LANG==='ar'?'موريتانيا':'Mauritanie'}" readonly></div>
   <div class="fl"><label>${sv('pin')} ${t('f_to')}</label><select id="q-to">${destOpts()}</select></div>
   ${dateField('q-depart',t('f_depart'))}${TRIP==='round'?dateField('q-return',t('f_return')):''}${cabinField()}${paxField()}${calc}`;
 } else if(SERVICE==='omra'){
   fields=`<div class="fl"><label>${sv('plane')} ${t('f_from')}</label><input type="text" value="${LANG==='ar'?'موريتانيا':'Mauritanie'}" readonly></div>
   ${dateField('q-depart',t('f_depart'))}${paxField()}${calc}`;
 } else if(SERVICE==='visa'){
   fields=`<div class="fl"><label>${sv('visa')} ${t('f_visa')}</label><select id="q-visa">${visaOpts()}</select></div>${paxField()}${calc}`;
 } else {
   fields=`<div class="fl"><label>${sv('pin')} ${t('f_to')}</label><select id="q-to">${destOpts()}</select></div>
   ${dateField('q-depart',t('f_checkin'))}${dateField('q-return',t('f_checkout'))}${paxField()}${calc}`;
 }
 return `<div class="searchcard" data-reveal>
   <div class="svc-tabs">${tabs}</div>
   <div class="svc-body">${top?`<div class="svc-top">${top}</div>`:''}<div class="fields">${fields}</div><div class="estimate" id="estimate"></div></div>
 </div>`;
}

function val(id){const e=document.getElementById(id);return e?e.value:'';}
function currentQuote(){
 const L=T[LANG];
 const cabMult={economy:1,prem:1.5,biz:2.4,first:3.4};
 const cabName={economy:t('cab_eco'),prem:t('cab_prem'),biz:t('cab_biz'),first:t('cab_first')};
 let label='', unit=0, kind='';
 if(SERVICE==='flight'){
   const d=DEST.find(x=>x.k===val('q-to'))||DEST[0];
   const cab=val('q-cabin')||'economy';
   unit=Math.round(d.price*cabMult[cab]*(TRIP==='round'?1:0.62));
   label=`${LANG==='ar'?'موريتانيا':'Mauritanie'} → ${LANG==='ar'?d.ar:d.fr}`;
   kind=(TRIP==='round'?t('f_round'):t('f_oneway'))+' · '+cabName[cab];
 } else if(SERVICE==='omra'){ unit=115000; label=LANG==='ar'?'عمرة من موريتانيا':'Omra de Mauritanie'; }
 else if(SERVICE==='visa'){ const v=VISA[parseInt(val('q-visa')||0,10)]; unit=v.price; label=LANG==='ar'?v.ar:v.fr; }
 else { const d=DEST.find(x=>x.k===val('q-to'))||DEST[0]; unit=Math.round(d.price*0.18); label=`${LANG==='ar'?'إقامة':'Séjour'} · ${LANG==='ar'?d.ar:d.fr}`; }
 const childRate=(SERVICE==='visa')?1:0.75;
 const total=Math.round(unit*ADULTS + unit*childRate*CHILDREN);
 let pax=ADULTS+' '+(ADULTS===1?L.w_adult:L.w_adults);
 if(CHILDREN>0)pax+=' + '+CHILDREN+' '+(CHILDREN===1?L.w_child:L.w_children)+(CHILD_AGES.length?(' ('+CHILD_AGES.slice(0,CHILDREN).join(', ')+' '+L.f_year+')'):'');
 const dep=val('q-depart'), ret=val('q-return');
 const dateText=dep?(dep+(ret?(' → '+ret):'')):'';
 return {total,label,kind,pax,dateText};
}

function submitBooking(q){

 if(!name||!tel){toast(LANG==='ar'?'يرجى إدخال الاسم والرقم':'Veuillez saisir nom et numéro');return;}
 const srv={flight:L.svc_flight,omra:L.svc_omra,visa:L.svc_visa,hotel:L.svc_hotel}[SERVICE];
 const details=[msg,q.kind,q.dateText,q.pax].filter(Boolean).join(' · ')+` · ${t('est_from')} ${fmt(q.total)} ${L.cur}`;
 const o=saveOrder({name,tel,service:srv,dest:q.label,details,price:q.total});

 box.innerHTML=`<div class="bk-done">${sv('check',' style="stroke:var(--ok)"')}<div><b>${LANG==='ar'?'تم استلام طلبك':'Demande reçue'} · ${o.id}</b><span>${LANG==='ar'?'سيتواصل معك فريقنا قريباً':'Notre équipe vous contactera bientôt'}</span></div></div>`;

}

 const oa=document.getElementById('of-add');
 if(oa)oa.addEventListener('click',()=>{
   const ti=(val('of-title')||'').trim();if(!ti){toast(LANG==='ar'?'أدخل عنوان العرض':'Saisir un titre');return;}
   const de=(val('of-desc')||'').trim(), disc=parseInt(val('of-disc'),10)||0;
   const f=fileIn&&fileIn.files[0];
   if(f){const r=new FileReader();r.onload=()=>{addOffer({t_ar:ti,t_fr:ti,d_ar:de,d_fr:de,ic:'tag',disc,img:r.result});};r.readAsDataURL(f);}
   else addOffer({t_ar:ti,t_fr:ti,d_ar:de,d_fr:de,ic:'tag',disc,img:''});
 });
 document.querySelectorAll('[data-offdel]').forEach(b=>b.addEventListener('click',()=>delOffer(parseInt(b.dataset.offdel,10))));
 // settings
 const ss=document.getElementById('set-save');if(ss)ss.addEventListener('click',()=>toast(t('set_saved')));
}
function openAdmin(){seedDemo();ADMIN_PAGE='dashboard';document.getElementById('admin').classList.add('show');renderAdmin();window.scrollTo(0,0);}
function closeAdmin(){document.getElementById('admin').classList.remove('show');if(location.hash==='#admin')history.replaceState(null,'',location.pathname);}

/* ---------------- misc ---------------- */
function scrollTo(id){const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth'});}
function toast(m){const el=document.getElementById('toast');el.innerHTML=sv('check',' style="stroke:#7fe0a8"')+'<span>'+m+'</span>';el.style.opacity=1;el.style.transform='translateX(-50%) translateY(0)';clearTimeout(window.__t);window.__t=setTimeout(()=>{el.style.opacity=0;el.style.transform='translateX(-50%) translateY(20px)';},2400);}

let _io;
function io_observe(){document.querySelectorAll('[data-reveal]:not(.in)').forEach(el=>_io.observe(el));}
function render(){
 document.documentElement.lang=LANG; document.documentElement.dir='rtl';
 document.getElementById('root').innerHTML=Header()+Hero()+Services()+Destinations()+Omra()+Ads()+Track()+Footer();
 wire();
}
function setLang(l){LANG=l;render();window.scrollTo(0,0);}
function setService(s){SERVICE=s;ADULTS=1;CHILDREN=0;CHILD_AGES=[];rebuildSearch();}
function rebuildSearch(){
 const card=document.querySelector('.searchcard');if(!card)return;
 card.outerHTML=SearchCard();
 const sc=document.querySelector('.searchcard');if(sc)sc.classList.add('in');
 wireSearch();
}
function refreshPax(){
 const wrap=document.querySelector('.pax-wrap');if(!wrap)return;
 wrap.innerHTML=`<label>${sv('user')} ${t('f_pax')}</label>
   <button type="button" class="pax-toggle" id="paxToggle">${sv('user',' class="u"')}<span id="paxSum">${paxSummary()}</span>${sv('chev',' class="c"')}</button>${paxPanel()}`;
 const p=document.getElementById('paxPanel');if(p)p.classList.add('open');
 wirePax();
 const est=document.getElementById('estimate');if(est&&est.classList.contains('show'))showEstimate();
}
function wirePax(){
 const tg=document.getElementById('paxToggle');
 if(tg)tg.addEventListener('click',e=>{e.stopPropagation();const p=document.getElementById('paxPanel');if(p)p.classList.toggle('open');});
 document.querySelectorAll('[data-pax]').forEach(b=>b.addEventListener('click',()=>{
   const d=parseInt(b.dataset.d,10);
   if(b.dataset.pax==='adults')ADULTS=Math.max(1,Math.min(9,ADULTS+d));
   else{CHILDREN=Math.max(0,Math.min(8,CHILDREN+d));if(CHILDREN>CHILD_AGES.length)CHILD_AGES.push(4);else CHILD_AGES=CHILD_AGES.slice(0,CHILDREN);}
   refreshPax();
 }));
 document.querySelectorAll('[data-childage]').forEach(s=>s.addEventListener('change',()=>{CHILD_AGES[parseInt(s.dataset.childage,10)]=parseInt(s.value,10);const est=document.getElementById('estimate');if(est&&est.classList.contains('show'))showEstimate();}));
 const done=document.getElementById('paxDone');if(done)done.addEventListener('click',()=>{const p=document.getElementById('paxPanel');if(p)p.classList.remove('open');});
}
function wireSearch(){
 document.querySelectorAll('.svc-tab').forEach(b=>b.addEventListener('click',()=>setService(b.dataset.svc)));
 document.querySelectorAll('[data-trip]').forEach(b=>b.addEventListener('click',()=>{TRIP=b.dataset.trip;rebuildSearch();}));
 const cb=document.getElementById('calcBtn');if(cb)cb.addEventListener('click',showEstimate);
 ['q-to','q-visa','q-cabin','q-depart','q-return'].forEach(id=>{const e=document.getElementById(id);if(e)e.addEventListener('change',()=>{const est=document.getElementById('estimate');if(est&&est.classList.contains('show'))showEstimate();});});
 wirePax();
}
function wire(){
 _io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');_io.unobserve(e.target);}}),{threshold:.06});
 io_observe();
 document.querySelectorAll('.langbtn').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
 document.querySelectorAll('[data-go]').forEach(a=>a.addEventListener('click',()=>{const m=document.getElementById('mob');if(m)m.style.display='none';scrollTo(a.dataset.go);}));
 document.querySelectorAll('[data-svc-go]').forEach(el=>el.addEventListener('click',()=>{setService(el.dataset.svcGo);scrollTo('home');}));
 document.querySelectorAll('[data-dest]').forEach(el=>el.addEventListener('click',()=>{setService('flight');const to=document.getElementById('q-to');if(to)to.value=el.dataset.dest;showEstimate();scrollTo('home');}));
 document.querySelectorAll('[data-dscroll]').forEach(b=>b.addEventListener('click',()=>{const sc=document.getElementById('dscroll');if(sc)sc.scrollBy({left:parseInt(b.dataset.dscroll,10)*320*-1,behavior:'smooth'});}));
 document.querySelectorAll('[data-admin]').forEach(a=>a.addEventListener('click',()=>{location.hash='admin';openAdmin();}));
 seedDemo();
 const tb=document.getElementById('trk-btn');if(tb)tb.addEventListener('click',trackLookup);
 const ti=document.getElementById('trk-id');if(ti)ti.addEventListener('keydown',e=>{if(e.key==='Enter')trackLookup();});
 const burger=document.getElementById('burger'),mob=document.getElementById('mob');
 if(burger)burger.onclick=()=>{mob.style.display=mob.style.display==='block'?'none':'block';};
 document.addEventListener('click',e=>{const p=document.getElementById('paxPanel');if(p&&p.classList.contains('open')&&!e.target.closest('.pax-wrap'))p.classList.remove('open');});
 wireSearch();
}
render();
if(location.hash==='#admin')openAdmin();
window.addEventListener('hashchange',()=>{if(location.hash==='#admin')openAdmin();else closeAdmin();});
</script>
</body>
</html>
